<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <form id="loginForm">
            <div class="input-group">
                <label for="loginUser">Имя пользователя</label>
                <input type="text" id="loginUser" placeholder="Имя пользователя" required>
            </div>
            
            <div class="input-group">
                <label for="loginPass">Пароль</label>
                <input type="password" id="loginPass" placeholder="Пароль" required>
            </div>
            
            <button type="submit" class="btn-green">Войти</button>
        </form>

        <div class="auth-footer">
            <p>Нет аккаунта? Зарегистрироваться</p>
            <button type="button" class="btn-secondary" onclick="window.location.href='./register.html'">Регистрация</button>
        </div>
    </div>

    <script>
        if (localStorage.getItem('currentSession')) {
            window.location.href = './catalog.html';
        }

        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            const u = document.getElementById('loginUser').value.trim();
            const p = document.getElementById('loginPass').value;
            const savedPassword = localStorage.getItem('user_' + u);

            if (savedPassword && savedPassword === p) {
                localStorage.setItem('currentSession', u);
                window.location.href = './catalog.html';
            } else {
                alert('Неверное имя пользователя или пароль!');
            }
        };
    </script>
</body>
</html>
