<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <form id="registerForm">
            <div class="input-group">
                <label for="regUser">Придумайте имя</label>
                <input type="text" id="regUser" placeholder="Придумайте имя" required>
            </div>
            
            <div class="input-group">
                <label for="regPass">Придумайте пароль</label>
                <input type="password" id="regPass" placeholder="Придумайте пароль" required>
            </div>
            
            <button type="submit" class="btn-green">Создать аккаунт</button>
        </form>
    </div>

    <script>
        document.getElementById('registerForm').onsubmit = function(e) {
            e.preventDefault();
            const u = document.getElementById('regUser').value.trim();
            const p = document.getElementById('regPass').value;

            if (!u || !p) return;

            localStorage.setItem('user_' + u, p);
            alert('Аккаунт успешно создан!');
            window.location.href = './index.html';
        };
    </script>
</body>
</html>
